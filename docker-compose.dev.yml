services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: builder
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - iridia-network

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://iridia:iridia_secret@db:5432/iridia_notes
      - SECRET_KEY=dev-secret-key-do-not-use-in-production
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - DB_HOST=db
      - DB_PORT=5432
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iridia-network

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=iridia
      - POSTGRES_PASSWORD=iridia_secret
      - POSTGRES_DB=iridia_notes
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iridia -d iridia_notes"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - iridia-network

networks:
  iridia-network:
    driver: bridge

volumes:
  postgres_data_dev:
